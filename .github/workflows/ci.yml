name: CI

# Runs on every push and pull request. Verifies the codebase compiles, the
# Go and TypeScript test suites pass, and frontend self-tests catch UI regressions.
# Heavy `wails build` smoke stays in `build-smoke.yml` so PR CI remains fast.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded runs on the same branch to save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Toolchain versions are centralised here so future bumps touch one place.
# (`uses:` action pins like `@v6` cannot be templated by GitHub Actions —
# those still live inline.)
env:
  # Pinned to the goenv global on the dev machine (CLAUDE.md). Do not
  # add a `.go-version` file — pin here instead.
  GO_VERSION: "1.26.2"
  NODE_VERSION: "22"

jobs:
  test:
    name: Test (Go + frontend)
    runs-on: ubuntu-latest
    environment:
      name: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Go test
        # `./...` would also try to build the `main` package, which has
        # `//go:embed all:frontend/dist` — that directory is gitignored and
        # only produced by `wails build`. All Go tests live under
        # `internal/`, so scope to that and skip the frontend build here.
        # `wails build` (in release.yml) is what actually verifies main.
        run: go test ./internal/...

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend test (vitest + DOM smoke)
        working-directory: frontend
        run: npm run test

      - name: Frontend type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend visual smoke (Playwright)
        working-directory: frontend
        run: npm run test:ui
