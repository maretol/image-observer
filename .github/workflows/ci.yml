name: CI

# Runs on every push and pull request. Verifies the codebase compiles, the
# Go and TypeScript test suites pass, and the frontend type-checks.
# Does NOT call `wails build` — release artifacts are produced only by
# `release.yml` on tag pushes (Windows-only, see docs/todo.md §I-5).

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded runs on the same branch to save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Toolchain versions are centralised here so future bumps touch one place.
# (`uses:` action pins like `@v6` cannot be templated by GitHub Actions —
# those still live inline.)
env:
  # Pinned to the goenv global on the dev machine (CLAUDE.md). Do not
  # add a `.go-version` file — pin here instead.
  GO_VERSION: "1.26.2"
  NODE_VERSION: "22"

jobs:
  test:
    name: Test (Go + frontend)
    runs-on: ubuntu-latest
    environment:
      name: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Stage embed placeholder for main package
        # `main.go` has `//go:embed all:frontend/dist`, which fails to
        # compile if the directory is missing. The directory is gitignored
        # and normally produced by `wails build` — but we want `go test ./...`
        # to also cover the root `app_test.go` (App.DeleteImage path
        # validation) without invoking a full Wails build. Touching a
        # placeholder file is enough for `//go:embed all:` to succeed; the
        # test doesn't read the embedded FS.
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/.ci-placeholder

      - name: Go test
        # `./...` covers both `internal/...` and root `app_test.go`. The
        # embed placeholder above keeps the main package buildable here;
        # the real `frontend/dist` is produced by `wails build` in
        # release.yml.
        run: go test ./...

      - name: Go cross-compile check (windows)
        # The windows build-tag files (internal/imgfile / winhwnd /
        # winplacement / winrestart / wintaskbar) are excluded from the
        # linux `go test` above and would otherwise only compile at
        # release-tag time (release.yml). They are pure syscall (no cgo),
        # so the ubuntu runner can cross-compile them (#149 D8).
        run: GOOS=windows go build ./...

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend test (vitest)
        working-directory: frontend
        run: npm run test

      - name: Frontend type-check
        working-directory: frontend
        run: npx tsc --noEmit
