name: Build smoke

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.26.2'
  NODE_VERSION: '22'
  WAILS_CLI_VERSION: 'v2.12.0'

jobs:
  wails-build-smoke:
    name: Wails build smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    environment:
      name: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_CLI_VERSION }}

      - name: Build Wails app (Linux smoke)
        run: wails build
