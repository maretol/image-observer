name: Release

# Builds Windows artifacts (portable EXE + NSIS installer) and uploads them
# to GitHub Releases when a `v*` tag is pushed. Tag is the source of truth
# for the version — `wails.json` and the Go-side `main.Version` are derived
# from it at build time and not committed (see docs/todo.md §I-2).

on:
  push:
    tags:
      - "v*"

permissions:
  # action-gh-release needs to create / update the Release.
  contents: write

# Toolchain versions are centralised here so future bumps touch one place.
# Keep these in sync with `.github/workflows/ci.yml`. (`uses:` action pins
# like `@v6` cannot be templated by GitHub Actions — those still live inline.)
env:
  # Pinned to the goenv global on the dev machine (CLAUDE.md).
  GO_VERSION: "1.26.2"
  NODE_VERSION: "22"
  # Wails CLI pin — keep in sync with .claude/context.md §5.
  WAILS_CLI_VERSION: "v2.12.0"

jobs:
  build:
    name: Build & release (windows-latest)
    runs-on: windows-latest
    # Tied to a GitHub Environment so deployment-side guards (required
    # reviewers / allowed branches-or-tags / wait timers / env-scoped
    # secrets) can be configured at Settings → Environments → "production".
    # The status check that branch protection rules pick up is
    # "Release / Build & release (windows-latest)". The "production"
    # environment must exist in the repo settings before this workflow runs.
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_CLI_VERSION }}

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"      # e.g. v0.1.0
          VERSION="${TAG#v}"                  # e.g. 0.1.0
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building tag=${TAG} version=${VERSION}"

      - name: Patch wails.json productVersion
        # Tag is the source of truth; flip the placeholder ("0.0.0") in
        # wails.json to the real version for this build only. Not committed.
        shell: bash
        run: |
          sed -i 's/"productVersion": "[^"]*"/"productVersion": "${{ steps.version.outputs.version }}"/' wails.json
          grep productVersion wails.json

      - name: Wails build (Windows + NSIS)
        shell: bash
        run: |
          wails build -platform windows/amd64 -nsis \
            -ldflags "-X main.Version=${{ steps.version.outputs.tag }}"

      # Self-signing (#61): if a self-signed code-signing cert is configured via
      # secrets, sign the produced EXEs so the app launches without warnings on
      # machines that trust the cert (the dev's own PC). Absent the secret the
      # step is skipped and artifacts ship unsigned — release never breaks.
      # Setup runbook + caveats: docs/spec-self-signing.md.
      - name: Detect signing secret
        id: signcheck
        shell: bash
        env:
          PFX_B64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
        run: |
          if [ -n "$PFX_B64" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signing secret present -> artifacts will be self-signed."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No signing secret -> artifacts will be left unsigned."
          fi

      - name: Sign Windows artifacts (self-signed)
        if: steps.signcheck.outputs.enabled == 'true'
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
          PFX_PASS: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          $pfxPath = Join-Path $env:RUNNER_TEMP 'signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_B64))
          $flags = [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]'PersistKeySet,Exportable'
          $cert  = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($pfxPath, $env:PFX_PASS, $flags)

          # CI runners don't trust our self-signed cert, so the verification
          # Status is never 'Valid' here. Treat "signer thumbprint matches +
          # timestamp applied" as success instead.
          $timestampServers = @(
            'http://timestamp.digicert.com',
            'http://timestamp.sectigo.com',
            'http://time.certum.pl'
          )
          $targets = @(Get-ChildItem -Path build/bin -Filter *.exe)
          if ($targets.Count -eq 0) { throw 'No .exe artifacts found under build/bin to sign.' }

          foreach ($exe in $targets) {
            $ok = $false
            foreach ($ts in $timestampServers) {
              try {
                Set-AuthenticodeSignature -FilePath $exe.FullName -Certificate $cert `
                  -HashAlgorithm SHA256 -TimestampServer $ts -ErrorAction Stop | Out-Null
              } catch {
                Write-Host "::warning::Sign via $ts failed for $($exe.Name): $($_.Exception.Message)"
                continue
              }
              $sig = Get-AuthenticodeSignature -FilePath $exe.FullName
              if ($sig.SignerCertificate -and `
                  $sig.SignerCertificate.Thumbprint -eq $cert.Thumbprint -and `
                  $sig.TimeStamperCertificate) {
                Write-Host "Signed $($exe.Name) (timestamp: $ts)"
                $ok = $true
                break
              }
              Write-Host "::warning::Signature not verified for $($exe.Name) via $ts; trying next."
            }
            if (-not $ok) { throw "Failed to sign $($exe.Name)" }
          }
          Remove-Item $pfxPath -Force

      - name: List artifacts
        shell: bash
        run: ls -la build/bin

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          # Tag-driven trigger: action picks up GITHUB_REF automatically.
          # Upload every .exe Wails produced under build/bin/. Today this
          # is just the portable `image-observer.exe`; once the NSIS step
          # actually emits an installer it gets picked up automatically
          # without yaml changes.
          files: |
            build/bin/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
